extract_info_task:
  description: >
    Review the job description carefully and extract all required skills, qualifications, experiences. Below is the job description:
    {job_desc}
  expected_output: >
    Return a JSON object with keys: 'skills', 'qualifications', 'responsibilities'
  agent: researcher

enhance_resume_task:
  description: >
    Update the original resume to better align with the skills, experiences, and requirements identified
    by the job description analyst. Use the extracted information from job description to clean up, rewrite and enhance
    the resume: {original_resume}, {extract_info_task.output}. Don't add skills or qualifications that don't
    exists in my original resume. Add a section for skills and qualifications required by the job description
    but not present in the original resume.
  expected_output: >
    Return the enhanced resume as improved text, highlighting new or updated sections, but keep the
    original json structure.
  output_file: >
    {enhanced_resume_path}
  agent: resume_enhancer
  depends_on: extract_info_task

style_resume_task:
  description: >
    Convert the enhanced JSON resume to a Markdown formatted resume with appropriate business styles. Use the enhanced resume: {enhance_resume_task.output}.
    Don't add any new sections or skills that are not present in the enhanced resume.
    Ensure the Markdown is well-structured and professional, suitable for business use.
  expected_output: >
    Return the resume as a Markdown string, styled for business use.
  output_file: >
    {styled_resume_path}
  agent: resume_stylist
  depends_on: enhance_resume_task
